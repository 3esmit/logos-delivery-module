name: Publish Delivery Module

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Rebuild and replace an existing package release for this version."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: Validate source release contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate release identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/master"
          scripts/test-release-contract.sh

  release:
    needs: preflight
    permissions:
      contents: write
    uses: 3esmit/logos-modules-release-action/.github/workflows/release.yml@7e09ddf90bf33ce29ef3505609332175a6cd06c9
    with:
      module_path: .
      metadata_path: metadata.json
      build_attr: lgx-portable
      variants: linux-amd64,darwin-arm64
      require_all_variants: true
      dispatch_rebuild_index: false
      prerelease: true
      signing_mode: none
      skip_if_published: ${{ !inputs.force_build }}
