name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Validate release workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate source release contract
        run: scripts/test-release-contract.sh

      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
          ACTIONLINT_SHA256: "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
        shell: bash
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          archive="$temp_dir/actionlint.tar.gz"
          curl -fsSL -o "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --status
          tar -xzf "$archive" -C "$temp_dir" actionlint
          "$temp_dir/actionlint" -color .github/workflows/ci.yml .github/workflows/release.yml

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check Attic cache credentials
        id: attic_credentials
        shell: bash
        env:
          ATTIC_ENDPOINT: ${{ secrets.ATTIC_ENDPOINT }}
          ATTIC_TOKEN_PUBLIC: ${{ secrets.ATTIC_TOKEN_PUBLIC }}
        run: |
          if [[ -n "$ATTIC_ENDPOINT" && -n "$ATTIC_TOKEN_PUBLIC" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Attic cache
        if: ${{ steps.attic_credentials.outputs.configured == 'true' }}
        uses: ryanccn/attic-action@v0
        with:
          endpoint: ${{ secrets.ATTIC_ENDPOINT }}
          cache: public
          token: ${{ secrets.ATTIC_TOKEN_PUBLIC }}
          skip-push: ${{ github.event_name == 'pull_request' }}

      - name: Build portable package
        run: nix build .#lgx-portable -L

      - name: Run tests
        run: nix build .#unit-tests -L
