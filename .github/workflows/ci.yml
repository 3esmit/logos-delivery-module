name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build module
        run: nix build -L

      - name: Run tests
        run: nix build .#unit-tests -L

      - name: Pre-warm cachix for install-portable
        if: matrix.os == 'ubuntu-latest'
        run: nix build -L .#install-portable

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs: build-and-test
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build delivery-module (install-portable layout)
        run: |
          nix build -L .#install-portable
          echo "LOGOS_MODULES_DIR=$PWD/result/modules" >> $GITHUB_ENV

      - name: Checkout logoscore-py and build smoke image
        run: |
          git clone https://github.com/logos-co/logos-logoscore-py.git /tmp/logoscore-py
          cd /tmp/logoscore-py
          git checkout aa45db52
          bash tests/docker_smoke/build_smoke_image.sh
          echo "LOGOSCORE_IMAGE=logoscore:smoke-portable" >> $GITHUB_ENV

      - name: Build logoscore CLI binary (host PATH)
        # Must match the daemon commit baked into the smoke image above.
        run: |
          nix build -L --out-link /tmp/logoscore-cli "github:logos-co/logos-logoscore-cli/5a1cf746e841e8e8a8fd48333cff55bd12c45c52#cli"
          echo "/tmp/logoscore-cli/bin" >> $GITHUB_PATH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tests/e2e/requirements.txt

      - name: Install e2e test dependencies
        run: |
          cd tests/e2e
          pip install -r requirements.txt

      - name: Run e2e tests
        run: |
          mkdir -p ${{ runner.temp }}/e2e-logs
          cd tests/e2e
          pytest -v
        env:
          E2E_LOG_DIR: ${{ runner.temp }}/e2e-logs
          LOGOSCORE_PY_FORWARD_OUTPUT: "1"

      - name: Capture start-wedge gdb backtrace (#58 diagnostic)
        if: always()
        continue-on-error: true
        run: |
          command -v gdb >/dev/null || { sudo apt-get update || true; sudo apt-get install -y gdb; }
          mkdir -p ${{ runner.temp }}/e2e-logs/wedge
          cd tests/e2e
          python diagnostics/wedge_gdb.py
        env:
          WEDGE_OUT_DIR: ${{ runner.temp }}/e2e-logs/wedge

      - name: Collect docker container logs on failure
        if: failure()
        run: |
          mkdir -p ${{ runner.temp }}/e2e-logs
          for c in $(docker ps -a --filter "name=logoscore-a" --filter "name=logoscore-b" --filter "name=logoscore-solo" -q); do
            name=$(docker inspect --format '{{.Name}}' "$c" | tr -d '/')
            docker logs "$c" > "${{ runner.temp }}/e2e-logs/${name}.log" 2>&1 || true
          done

      - name: Upload daemon logs and wedge diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: ${{ runner.temp }}/e2e-logs/
          if-no-files-found: ignore
          retention-days: 7
