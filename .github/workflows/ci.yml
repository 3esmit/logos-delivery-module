name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check Attic cache credentials
        id: attic_credentials
        shell: bash
        env:
          ATTIC_ENDPOINT: ${{ secrets.ATTIC_ENDPOINT }}
          ATTIC_TOKEN_PUBLIC: ${{ secrets.ATTIC_TOKEN_PUBLIC }}
        run: |
          if [[ -n "$ATTIC_ENDPOINT" && -n "$ATTIC_TOKEN_PUBLIC" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Attic cache
        if: ${{ steps.attic_credentials.outputs.configured == 'true' }}
        uses: ryanccn/attic-action@v0
        with:
          endpoint: ${{ secrets.ATTIC_ENDPOINT }}
          cache: public
          token: ${{ secrets.ATTIC_TOKEN_PUBLIC }}
          skip-push: ${{ github.event_name == 'pull_request' }}

      - name: Build module
        run: nix build -L

      - name: Run tests
        run: nix build .#unit-tests -L
