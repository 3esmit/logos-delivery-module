rom 'https://cache.nixos.org'...\ncopying path '/nix/store/bn33dkib2hvgwpndi2128m1rsgs7irmf-gtest-1.17.0' from 'https://cache.nixos.org'...\ncopying path '/nix/store/s35yr13fijzw164c0blsh2vv820bjy6a-fmt-10.2.1-dev' from 'https://cache.nixos.org'...\ncopying path '/nix/store/bbz30hcqd2p6g8qp26aq1n58a92203cq-spdlog-1.15.2' from 'https://cache.nixos.org'...\nbuilding '/nix/store/h72ihz88w9vw3jyw9yw4836alf52av7p-logos_build_info.h.drv'...\ncopying path '/nix/store/xqqw33hbphc98vblpyikjvnaxdv0f7xj-gtest-1.17.0-dev' from 'https://cache.nixos.org'...\ncopying path '/nix/store/sqarsa3lakqdyhfcrjcmq5y0nrg2g0bb-logos-module-loader-qt-build-0.1.0' from 'https://cache.nix.logos.co/public'...\ncopying path '/nix/store/adrkx1xf59fhhhinzc0dys7h6ngpdcps-logos-liblogos-lib-0.1.0' from 'https://cache.nix.logos.co/public'...\ncopying path '/nix/store/1nc40zygqm5rzgxqsqk4j1ldipjy97bd-logos-module-loader-qt-bin-0.1.0' from 'https://cache.nix.logos.co/public'...\ncopying path '/nix/store/nwapdn0k9wpbx6spqqp772w652d7njx9-logos-liblogos-bin-0.1.0' from 'https://cache.nix.logos.co/public'...\ncopying path '/nix/store/q7pl6mcnzbb9hx72nrlr4nz10i1jfgq6-logos-liblogos' from 'https://cache.nix.logos.co/public'...\nbuilding '/nix/store/b19kw81q06an6vlsk1f3rdxzj43hdcyz-logos-logoscore-cli-0.1.0-dev.drv'...\nbuilding '/nix/store/r2087c6a0njbrm5lfd9grmk2913bw7y1-logos-logoscore-cli-bin-0.1.0-dev.drv'...\nbuilding '/nix/store/fmnazciw0hnv14rrj8rqj43zpa26k5xs-logos-logoscore-cli.drv'...\n", "note": ""}]}, {"md": "## Step 2: Build the lgpm package manager\n\n`lgpm` installs `.lgx` packages into a modules directory and scans what is\ninstalled. Build it from the `logos-package-manager` flake and link it as\n`./lgpm`.", "execs": []}, {"md": "### 2.1 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```\n\nThe executable is at `./lgpm/bin/lgpm`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-package-manager/205d6bb295c43e9432aef367dd32dac82e39bddf' into the Git cache...\ncopying path '/nix/store/zw9hpnbqhg04ff9iybgb0f96jb0kdyhh-source' from 'https://cache.nix.logos.co/public'...\nthis path will be fetched (0.0 KiB download, 1.0 MiB unpacked):\n  /nix/store/dagqkb2ij7dw82d40hcvmwbmnz3w3xa5-logos-package-manager-cli-1.0.0-dev\ncopying path '/nix/store/dagqkb2ij7dw82d40hcvmwbmnz3w3xa5-logos-package-manager-cli-1.0.0-dev' from 'https://cache.nix.logos.co/public'...\n", "note": ""}]}, {"md": "## Step 3: Build and install this delivery module\n\nBuild **this** delivery module's `.lgx` straight from its flake's `#lgx`\noutput and install it into a local `./modules` directory with `lgpm`. Every\nmodule built with\n[`logos-module-builder`](https://github.com/logos-co/logos-module-builder)\nexposes a ready-to-install `#lgx`.\n\n> The `` in the URL is what pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested. With\n> no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 3.1 Build the module's .lgx\n\nBuild the `#lgx` output and link it as `./delivery-lgx`. (This compiles\nthe module and its SDK dependencies through Nix, so the first build is\nslow.)\n\n```bash\n# From inside the clone this is simply: nix build '.#lgx'\nnix build 'github:logos-co/logos-delivery-module#lgx' -o delivery-lgx\n```\n\nThe `.lgx` package is now under `./delivery-lgx/`:\n\n```bash\nls delivery-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-delivery-module#lgx' -o delivery-lgx", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-delivery-module/c21ffb83b2b891843de9a940dd60e5e56c8803de' into the Git cache...\nwarning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\nthis derivation will be built:\n  /nix/store/npdijmszk753nfl7gsb0m5mfv8vvbipn-logos-delivery_module-module-lib-lgx-0.1.3.drv\nthis path will be fetched (0.0 KiB download, 38.5 MiB unpacked):\n  /nix/store/gcisa1k0m1474c39yzxpwndaw7w69dnh-logos-delivery_module-module-lib-0.1.3\ncopying path '/nix/store/gcisa1k0m1474c39yzxpwndaw7w69dnh-logos-delivery_module-module-lib-0.1.3' from 'https://cache.nix.logos.co/public'...\nbuilding '/nix/store/npdijmszk753nfl7gsb0m5mfv8vvbipn-logos-delivery_module-module-lib-lgx-0.1.3.drv'...\n", "note": ""}, {"kind": "run", "cmd": "ls delivery-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "delivery-lgx/logos-delivery_module-module-lib.lgx\n", "note": ""}]}, {"md": "### 3.2 Seed the modules directory with the bundled capability module\n\n`delivery_module` is loaded through the host's capability layer, so the\nmodules directory also needs the `capability_module` that ships with\n`logoscore`. Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `delivery_module` is\na `core` module, so it goes to `--modules-dir`. The package is unsigned\n(a local dev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: delivery-lgx/logos-delivery_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.4 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \ndelivery_module                0.1.3           core       protocol       \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `delivery_module`, introspect it, create a node from a\nWaku config, and start it. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Write the node config\n\nCreate `waku-config.json` \u2014 a `logos.dev` network configuration for the\ndelivery node: cluster 2 with 8 auto-shards, relay/filter/lightpush\nenabled, mix routing, and discv5 discovery.\n\n> Extended Kademlia discovery (`enableKadDiscovery` +\n> `kadBootstrapNodes`) is intentionally omitted here. The node's\n> `start` performs a **blocking** Kademlia DHT bootstrap that only\n> returns once the DHT is joined; in a headless/CI run that bootstrap\n> does not complete, so `start` never returns and the call times out.\n> discv5 (plus the relay/rendezvous peers) is enough to join the\n> network for this doc-test. See `tests/test_delivery_start_hang.cpp`.\n\n```json\n{\n  \"tcpPort\": 30303,\n  \"discv5UdpPort\": 9000,\n  \"nodekey\": \"b9800176f31e41304dff5d385944c349300204361fca56beec956b7181fbc5ae\",\n  \"clusterId\": 2,\n  \"numShardsInNetwork\": 8,\n  \"maxConnections\": 300,\n  \"relay\": true,\n  \"store\": false,\n  \"filter\": true,\n  \"lightpush\": true,\n  \"logLevel\": \"DEBUG\",\n  \"websocketSupport\": true,\n  \"websocketPort\": 8000,\n  \"websocketSecureSupport\": false,\n  \"discv5Discovery\": true,\n  \"mix\": true,\n  \"mixkey\": \"fc2d71d52cdd37cb49cca3f6a8e6877f40bc999ed67ab5808bb3b9f685cf0f94\",\n  \"nat\": \"extip:138.68.122.137\",\n  \"extMultiaddrs\": [\"/dns4/delivery-01.do-ams3.logos.dev.status.im/tcp/30303\"]\n}\n```", "execs": [{"kind": "file", "cmd": "write waku-config.json", "status": "pass", "note": "Wrote waku-config.json"}]}, {"md": "### 4.2 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-07-13 20:32:45.185] [warning] [logos] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-07-13 20:32:45.238] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: detected LogosProviderPlugin for \"capability_module\"\n[2026-07-13 20:32:45.239] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: registering LogosProviderObject directly for \"capability_module\"\n[2026-07-13 20:32:45.239] [info] [logos] [capability_module] [LogosProviderObject] LogosProviderBase::init called\n[2026-07-13 20:32:45.239] [info] [logos] [capability_module] [LogosProviderObject] ModuleProxy: created, wrapping LogosProviderObject \"capability_module\"\n[2026-07-13 20:32:45.240] [info] [logos] [capability_module] RemoteTransportHost: Created registry host with URL: \"local:logos_capability_module_982ba509da3c\"\n[2026-07-13 20:32:45.240] [info] [logos] [capability_module] RemoteTransportHost: Published object: \"capability_module\"\n[2026-07-13 20:32:45.240] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: successfully published \"capability_module\"\n[2026-07-13 20:32:45.475] [info] [logos] [capability_module] [LogosProviderObject] Saving token for module: \"capability_module\"\n[2026-07-13 20:32:45.475] [info] [logos] Module loaded: capability_module\nLogoscore daemon started (pid 12917, instance 982ba509da3c)\nDaemon state: /tmp/doctest-test-8lbhlm5g/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-8lbhlm5g/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 4.4 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":12917,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"delivery_module\",\"status\":\"not_loaded\",\"version\":\"0.1.3\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 4.5 List discovered modules\n\n`delivery_module` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"delivery_module\",\"status\":\"not_loaded\",\"version\":\"0.1.3\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}]\n", "note": ""}]}, {"md": "### 4.6 Load the module\n\nLoad `delivery_module` into the running daemon:\n\n```bash\nlogoscore load-module delivery_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module delivery_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"delivery_module\",\"status\":\"ok\",\"version\":\"0.1.3\"}\n", "note": ""}]}, {"md": "### 4.7 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports\n`loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":12917,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"delivery_module\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"0.1.3\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.8 Introspect the module with module-info\n\n`module-info` lists the `Q_INVOKABLE` methods the module exposes \u2014 the\nsame methods you can `call`:\n\n```bash\nlogoscore module-info delivery_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info delivery_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies\":[],\"dependents\":[],\"events\":[{\"name\":\"messageSent\",\"parameters\":[{\"name\":\"requestId\",\"type\":\"QString\"},{\"name\":\"messageHash\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"messageSent(QString,QString,int)\",\"type\":\"event\"},{\"name\":\"messageError\",\"parameters\":[{\"name\":\"requestId\",\"type\":\"QString\"},{\"name\":\"messageHash\",\"type\":\"QString\"},{\"name\":\"error\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"messageError(QString,QString,QString,int)\",\"type\":\"event\"},{\"name\":\"messagePropagated\",\"parameters\":[{\"name\":\"requestId\",\"type\":\"QString\"},{\"name\":\"messageHash\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"messagePropagated(QString,QString,int)\",\"type\":\"event\"},{\"name\":\"messageReceived\",\"parameters\":[{\"name\":\"messageHash\",\"type\":\"QString\"},{\"name\":\"contentTopic\",\"type\":\"QString\"},{\"name\":\"payload\",\"type\":\"QByteArray\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"messageReceived(QString,QString,QByteArray,int)\",\"type\":\"event\"},{\"name\":\"connectionStateChanged\",\"parameters\":[{\"name\":\"connectionStatus\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"connectionStateChanged(QString,int)\",\"type\":\"event\"},{\"name\":\"nodeStarted\",\"parameters\":[{\"name\":\"success\",\"type\":\"bool\"},{\"name\":\"message\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"nodeStarted(bool,QString,int)\",\"type\":\"event\"},{\"name\":\"nodeStopped\",\"parameters\":[{\"name\":\"success\",\"type\":\"bool\"},{\"name\":\"message\",\"type\":\"QString\"},{\"name\":\"timestamp\",\"type\":\"int\"}],\"signature\":\"nodeStopped(bool,QString,int)\",\"type\":\"event\"}],\"methods\":[{\"description\":\"@brief Creates a liblogosdelivery node from a WakuNodeConf JSON document.\\n\\nThe JSON is parsed by logos-delivery (liblogosdelivery folder) side and maps to\\n`WakuNodeConf` from `tools/confutils/cli_args.nim`\\n(https://github.com/logos-messaging/logos-delivery).\\n\\nThe configuration is a **flat** JSON object whose keys correspond to\\n`WakuNodeConf` Nim field names (camelCase). Unknown keys are silently\\nignored. Every field has a built-in default, so only the values that\\ndiffer from defaults need to be supplied.\\n\\n## Commonly used keys\\n| Key                  | Type             | Default    | Description                                 |\\n|----------------------|------------------|------------|---------------------------------------------|\\n| `mode`               | string           | `\\\"noMode\\\"` | `\\\"Core\\\"`, `\\\"Edge\\\"`, or `\\\"noMode\\\"`           |\\n| `preset`             | string           | `\\\"\\\"`       | Network preset (`\\\"twn\\\"`, `\\\"logos.dev\\\"`, \u2026)  |\\n| `clusterId`          | number (uint16)  | `0`        | Cluster identifier                          |\\n| `entryNodes`         | array of string  | `[]`       | Bootstrap peers (enrtree / multiaddress)    |\\n| `relay`              | boolean          | `false`    | Enable relay protocol                       |\\n| `rlnRelay`           | boolean          | `false`    | Enable RLN rate-limit nullifier             |\\n| `tcpPort`            | number (uint16)  | `60000`    | P2P TCP listen port                         |\\n| `numShardsInNetwork` | number (uint16)  | `1`        | Auto-sharding shard count                   |\\n| `logLevel`           | string           | `\\\"INFO\\\"`   | `\\\"TRACE\\\"`, `\\\"DEBUG\\\"`, `\\\"INFO\\\"`, `\\\"WARN\\\"`, \u2026 |\\n| `logFormat`          | string           | `\\\"TEXT\\\"`   | `\\\"TEXT\\\"` or `\\\"JSON\\\"`                        |\\n| `maxMessageSize`     | string           | `\\\"150KiB\\\"` | Maximum message payload size                |\\n\\n## Presets\\nUsing a `preset` populates cluster ID, entry nodes, sharding, RLN, and\\nother network-specific defaults automatically. Individual keys supplied\\nalongside a preset override the preset values.\\n- `\\\"twn\\\"` \u2013 The RLN-protected Waku Network (cluster 1).\\n- `\\\"logos.dev\\\"` \u2013 Logos Dev Network (cluster 2, mix enabled,\\np2pReliability on, 8 auto-shards, built-in bootstrap nodes).\\n\\nMinimal `logos.dev` example:\\n@code{.json}\\n{\\n\\\"logLevel\\\": \\\"INFO\\\",\\n\\\"mode\\\": \\\"Core\\\",\\n\\\"preset\\\": \\\"logos.dev\\\"\\n}\\n@endcode\\n\\nFull override example:\\n@code{.json}\\n{\\n\\\"mode\\\": \\\"Core\\\",\\n\\\"clusterId\\\": 42,\\n\\\"entryNodes\\\": [\\\"enrtree://TREE@nodes.example.com\\\"],\\n\\\"relay\\\": true,\\n\\\"tcpPort\\\": 60000,\\n\\\"numShardsInNetwork\\\": 8,\\n\\\"maxMessageSize\\\": \\\"150KiB\\\",\\n\\\"logLevel\\\": \\\"INFO\\\",\\n\\\"logFormat\\\": \\\"TEXT\\\"\\n}\\n@endcode\\n\\n@param cfg UTF-8 JSON payload string.\\n@return `true` if context creation succeeds and callback returns `RET_OK`,\\notherwise `false`.\",\"isInvokable\":true,\"name\":\"createNode\",\"parameters\":[{\"name\":\"cfg\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"createNode(QString)\"},{\"description\":\"@brief Starts the delivery node.\\n@return `true` once dispatched; completion is reported via `nodeStarted`.\",\"isInvokable\":true,\"name\":\"start\",\"returnType\":\"LogosResult\",\"signature\":\"start()\"},{\"description\":\"@brief Stops the delivery node.\\n@return `true` once dispatched; completion is reported via `nodeStopped`.\",\"isInvokable\":true,\"name\":\"stop\",\"returnType\":\"LogosResult\",\"signature\":\"stop()\"},{\"description\":\"@brief Sends a message over the active node.\\n\\nBuilds a JSON envelope expected by `logosdelivery_send`:\\n`{ \\\"contentTopic\\\": string, \\\"payload\\\": base64, \\\"ephemeral\\\": false }`.\\n\\nReturns a requestId on success. Async results come via typed events:\\n- `messageError` emitted if the module can't send the message\\n- `messagePropagated` emitted if the message has hit the network\\n- `messageSent` emitted after the message is validated by the network\\n\\n@param contentTopic Destination content topic.\\n@param payload Raw message bytes; base64-encoded before crossing the FFI boundary.\\n@return Success with request id, or error details.\",\"isInvokable\":true,\"name\":\"send\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"},{\"name\":\"payload\",\"type\":\"QByteArray\"}],\"returnType\":\"LogosResult\",\"signature\":\"send(QString,QByteArray)\"},{\"description\":\"@brief Subscribes to the supplied content topic.\\n@param contentTopic Topic identifier.\\n@return `true` when subscribed successfully, otherwise `false`.\",\"isInvokable\":true,\"name\":\"subscribe\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"subscribe(QString)\"},{\"description\":\"@brief Unsubscribes from the supplied content topic.\\n@param contentTopic Topic identifier.\\n@return `true` when unsubscribed successfully, otherwise `false`.\",\"isInvokable\":true,\"name\":\"unsubscribe\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"unsubscribe(QString)\"},{\"isInvokable\":true,\"name\":\"getAvailableNodeInfoIDs\",\"returnType\":\"LogosResult\",\"signature\":\"getAvailableNodeInfoIDs()\"},{\"description\":\"@brief Returns information for the given node info item.\\n@param nodeInfoId Identifier for the requested node info item.\\n@return JSON data string on success, or error details.\",\"isInvokable\":true,\"name\":\"getNodeInfo\",\"parameters\":[{\"name\":\"nodeInfoId\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"getNodeInfo(QString)\"},{\"description\":\"@brief Information about the available configuration parameters for `createNode`.\",\"isInvokable\":true,\"name\":\"getAvailableConfigs\",\"returnType\":\"LogosResult\",\"signature\":\"getAvailableConfigs()\"},{\"description\":\"@brief Returns the node's metrics as an OpenMetrics/Prometheus text\\ndocument, so the `openmetrics` module can scrape this module.\\n\\nliblogosdelivery already aggregates Prometheus metrics in its global\\nregistry and renders them as exposition text behind the `\\\"Metrics\\\"`\\nnode-info attribute. This method just hands that text back verbatim \u2014 no\\nreshaping \u2014 which satisfies the openmetrics `metrics_source` interface's\\n`collectOpenMetricsText()` convention. The openmetrics scraper parses the\\ntext, injects a `module=\\\"delivery_module\\\"` label on every series, and\\nmerges it with other modules. Select this method per-module in the\\nopenmetrics `start` config with `{\\\"name\\\":\\\"delivery_module\\\",\\\"format\\\":\\\"text\\\"}`.\\n\\nReturns an empty string before a node has been created, or when the\\nunderlying read fails, so a scrape never errors out on this module.\\n\\n@return OpenMetrics/Prometheus exposition text (possibly empty).\",\"isInvokable\":true,\"name\":\"collectOpenMetricsText\",\"returnType\":\"QString\",\"signature\":\"collectOpenMetricsText()\"},{\"isInvokable\":true,\"name\":\"version\",\"returnType\":\"QString\",\"signature\":\"version()\"}],\"name\":\"delivery_module\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"0.1.3\"}\n", "note": ""}]}, {"md": "### 4.9 Create the delivery node\n\n`createNode` takes a Waku node configuration JSON document and creates a\nliblogosdelivery node context. The `@` prefix tells `logoscore` to load\nthe file contents as the argument:\n\n```bash\nlogoscore call delivery_module createNode @waku-config.json\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call delivery_module createNode @waku-config.json", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createNode\",\"module\":\"delivery_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 5\n```", "execs": [{"kind": "run", "cmd": "sleep 5", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.10 Start the delivery node\n\n`start` boots the node created by `createNode`. This is a synchronous call\nthat returns when the node has started:\n\n```bash\nlogoscore call delivery_module start\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call delivery_module start", "status": "pass", "exit_code": 0, "output": "{\"method\":\"start\",\"module\":\"delivery_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.11 Review daemon logs after node start\n\nCheck the daemon output fo <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
