lity layer, so the\nmodules directory also needs the `capability_module` that ships with\n`logoscore`. Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `delivery_module` is\na `core` module, so it goes to `--modules-dir`. The package is unsigned\n(a local dev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: delivery-lgx/logos-delivery_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.4 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \ndelivery_module                0.1.2           core       protocol       \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `delivery_module`, introspect it, create a node from a\nWaku config, and start it. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Write the node config\n\nCreate `waku-config.json` \u2014 a full `logos.dev` network configuration for\nthe delivery node: cluster 2 with 8 auto-shards, relay/filter/lightpush\nenabled, mix routing, discv5 plus Kademlia discovery, and the logos.dev\nbootstrap nodes:\n\n```json\n{\n  \"tcpPort\": 30303,\n  \"discv5UdpPort\": 9000,\n  \"nodekey\": \"b9800176f31e41304dff5d385944c349300204361fca56beec956b7181fbc5ae\",\n  \"clusterId\": 2,\n  \"numShardsInNetwork\": 8,\n  \"maxConnections\": 300,\n  \"relay\": true,\n  \"store\": false,\n  \"filter\": true,\n  \"lightpush\": true,\n  \"logLevel\": \"DEBUG\",\n  \"websocketSupport\": true,\n  \"websocketPort\": 8000,\n  \"websocketSecureSupport\": false,\n  \"discv5Discovery\": true,\n  \"mix\": true,\n  \"mixkey\": \"fc2d71d52cdd37cb49cca3f6a8e6877f40bc999ed67ab5808bb3b9f685cf0f94\",\n  \"nat\": \"extip:138.68.122.137\",\n  \"extMultiaddrs\": [\"/dns4/delivery-01.do-ams3.logos.dev.status.im/tcp/30303\"],\n  \"enableKadDiscovery\": true,\n  \"kadBootstrapNodes\": [\"/dns4/delivery-01.do-ams3.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAmTUbnxLGT9JvV6mu9oPyDjqHK4Phs1VDJNUgESgNSkuby\", \"/dns4/delivery-02.do-ams3.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAmMK7PYygBtKUQ8EHp7EfaD3bCEsJrkFooK8RQ2PVpJprH\", \"/dns4/delivery-01.gc-us-central1-a.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAm4S1JYkuzDKLKQvwgAhZKs9otxXqt8SCGtB4hoJP1S397\", \"/dns4/delivery-02.gc-us-central1-a.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAm8Y9kgBNtjxvCnf1X6gnZJW5EGE4UwwCL3CCm55TwqBiH\", \"/dns4/delivery-01.ac-cn-hongkong-c.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAm8YokiNun9BkeA1ZRmhLbtNUvcwRr64F69tYj9fkGyuEP\", \"/dns4/delivery-02.ac-cn-hongkong-c.logos.dev.status.im/tcp/30303/p2p/16Uiu2HAkvwhGHKNry6LACrB8TmEFoCJKEX29XR5dDUzk3UT3UNSE\"]\n}\n```", "execs": [{"kind": "file", "cmd": "write waku-config.json", "status": "pass", "note": "Wrote waku-config.json"}]}, {"md": "### 4.2 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-16 15:04:08.990] [warning] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-16 15:04:09.304] [info] Module loaded: capability_module\nLogoscore daemon started (pid 24780, instance 90ecd76a971f)\nDaemon state: /tmp/doctest-test-j_vfctc_/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-j_vfctc_/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 4.4 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":24780,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"delivery_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 4.5 List discovered modules\n\n`delivery_module` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"delivery_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "### 4.6 Load the module\n\nLoad `delivery_module` into the running daemon:\n\n```bash\nlogoscore load-module delivery_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module delivery_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"delivery_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.7 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports\n`loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":24780,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"delivery_module\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.8 Introspect the module with module-info\n\n`module-info` lists the `Q_INVOKABLE` methods the module exposes \u2014 the\nsame methods you can `call`:\n\n```bash\nlogoscore module-info delivery_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info delivery_module", "status": "pass", "exit_code": 0, "output": "{\"events\":[],\"methods\":[{\"isInvokable\":true,\"name\":\"createNode\",\"parameters\":[{\"name\":\"cfg\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"createNode(QString)\"},{\"isInvokable\":true,\"name\":\"start\",\"returnType\":\"LogosResult\",\"signature\":\"start()\"},{\"isInvokable\":true,\"name\":\"stop\",\"returnType\":\"LogosResult\",\"signature\":\"stop()\"},{\"isInvokable\":true,\"name\":\"send\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"},{\"name\":\"payload\",\"type\":\"QByteArray\"}],\"returnType\":\"LogosResult\",\"signature\":\"send(QString,QByteArray)\"},{\"isInvokable\":true,\"name\":\"subscribe\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"subscribe(QString)\"},{\"isInvokable\":true,\"name\":\"unsubscribe\",\"parameters\":[{\"name\":\"contentTopic\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"unsubscribe(QString)\"},{\"isInvokable\":true,\"name\":\"getAvailableNodeInfoIDs\",\"returnType\":\"LogosResult\",\"signature\":\"getAvailableNodeInfoIDs()\"},{\"isInvokable\":true,\"name\":\"getNodeInfo\",\"parameters\":[{\"name\":\"nodeInfoId\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"getNodeInfo(QString)\"},{\"isInvokable\":true,\"name\":\"getAvailableConfigs\",\"returnType\":\"LogosResult\",\"signature\":\"getAvailableConfigs()\"},{\"isInvokable\":true,\"name\":\"version\",\"returnType\":\"QString\",\"signature\":\"version()\"}],\"name\":\"delivery_module\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 4.9 Create the delivery node\n\n`createNode` takes a Waku node configuration JSON document and creates a\nliblogosdelivery node context. The `@` prefix tells `logoscore` to load\nthe file contents as the argument:\n\n```bash\nlogoscore call delivery_module createNode @waku-config.json\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call delivery_module createNode @waku-config.json", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createNode\",\"module\":\"delivery_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 40\n```", "execs": [{"kind": "run", "cmd": "sleep 40", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.10 Start the delivery node\n\n`start` boots the node created by `createNode`. This is a synchronous call\nthat returns when the node has started:\n\n```bash\nlogoscore call delivery_module start\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call delivery_module start", "status": "fail", "exit_code": 4, "output": "{\"code\" <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
