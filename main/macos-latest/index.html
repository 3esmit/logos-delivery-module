gos.drv'...\nbuilding '/nix/store/k7h3qqm3hn00z70b35cgvqh3gm4sybpz-logos-logoscore-cli-0.1.0-dev.drv'...\nbuilding '/nix/store/2nq2y3xj9nkvdmy550pjw1ac6z0ik1ac-logos-logoscore-cli-bin-0.1.0-dev.drv'...\nbuilding '/nix/store/sgbcnp9qvq059bgwzh3f0aq4dsnk2v8w-logos-logoscore-cli.drv'...\n", "note": ""}]}, {"md": "## Step 2: Build the lgpm package manager\n\n`lgpm` installs `.lgx` packages into a modules directory and scans what is\ninstalled. Build it from the `logos-package-manager` flake and link it as\n`./lgpm`.", "execs": []}, {"md": "### 2.1 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```\n\nThe executable is at `./lgpm/bin/lgpm`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-package-manager/205d6bb295c43e9432aef367dd32dac82e39bddf' into the Git cache...\ncopying path '/nix/store/zw9hpnbqhg04ff9iybgb0f96jb0kdyhh-source' from 'https://cache.nix.logos.co/public'...\nthese 3 derivations will be built:\n  /nix/store/05k29zf1m5iws9rys5ljnmygvh43i6j0-logos-package-manager-lib-1.0.0-dev.drv\n  /nix/store/grn518iihwss1axcmyrrmcz3dhqmmr43-logos_build_info.h.drv\n  /nix/store/m60md3fxz0gi6n9zar28h0hr2qqzgs4m-logos-package-manager-cli-1.0.0-dev.drv\nbuilding '/nix/store/05k29zf1m5iws9rys5ljnmygvh43i6j0-logos-package-manager-lib-1.0.0-dev.drv'...\nbuilding '/nix/store/grn518iihwss1axcmyrrmcz3dhqmmr43-logos_build_info.h.drv'...\nbuilding '/nix/store/m60md3fxz0gi6n9zar28h0hr2qqzgs4m-logos-package-manager-cli-1.0.0-dev.drv'...\n", "note": ""}]}, {"md": "## Step 3: Build and install this delivery module\n\nBuild **this** delivery module's `.lgx` straight from its flake's `#lgx`\noutput and install it into a local `./modules` directory with `lgpm`. Every\nmodule built with\n[`logos-module-builder`](https://github.com/logos-co/logos-module-builder)\nexposes a ready-to-install `#lgx`.\n\n> The `` in the URL is what pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested. With\n> no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 3.1 Build the module's .lgx\n\nBuild the `#lgx` output and link it as `./delivery-lgx`. (This compiles\nthe module and its SDK dependencies through Nix, so the first build is\nslow.)\n\n```bash\n# From inside the clone this is simply: nix build '.#lgx'\nnix build 'github:logos-co/logos-delivery-module#lgx' -o delivery-lgx\n```\n\nThe `.lgx` package is now under `./delivery-lgx/`:\n\n```bash\nls delivery-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-delivery-module#lgx' -o delivery-lgx", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-delivery-module/3a4234fd1db07873d464810ccbaf2fb9b56dbaa2' into the Git cache...\n", "note": ""}, {"kind": "run", "cmd": "ls delivery-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "delivery-lgx/logos-delivery_module-module-lib.lgx\n", "note": ""}]}, {"md": "### 3.2 Seed the modules directory with the bundled capability module\n\n`delivery_module` is loaded through the host's capability layer, so the\nmodules directory also needs the `capability_module` that ships with\n`logoscore`. Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `delivery_module` is\na `core` module, so it goes to `--modules-dir`. The package is unsigned\n(a local dev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: delivery-lgx/logos-delivery_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.4 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \ndelivery_module                0.1.3           core       protocol       \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `delivery_module`, introspect it, create a node from a\nWaku config, and start it. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Write the node config\n\nCreate `waku-config.json` \u2014 a `logos.dev` network configuration for the\ndelivery node: cluster 2 with 8 auto-shards, relay/filter/lightpush\nenabled, mix routing, and discv5 discovery.\n\n> Extended Kademlia discovery (`enableKadDiscovery` +\n> `kadBootstrapNodes`) is intentionally omitted here. The node's\n> `start` performs a **blocking** Kademlia DHT bootstrap that only\n> returns once the DHT is joined; in a headless/CI run that bootstrap\n> does not complete, so `start` never returns and the call times out.\n> discv5 (plus the relay/rendezvous peers) is enough to join the\n> network for this doc-test. See `tests/test_delivery_start_hang.cpp`.\n\n```json\n{\n  \"tcpPort\": 30303,\n  \"discv5UdpPort\": 9000,\n  \"nodekey\": \"b9800176f31e41304dff5d385944c349300204361fca56beec956b7181fbc5ae\",\n  \"clusterId\": 2,\n  \"numShardsInNetwork\": 8,\n  \"maxConnections\": 300,\n  \"relay\": true,\n  \"store\": false,\n  \"filter\": true,\n  \"lightpush\": true,\n  \"logLevel\": \"DEBUG\",\n  \"websocketSupport\": true,\n  \"websocketPort\": 8000,\n  \"websocketSecureSupport\": false,\n  \"discv5Discovery\": true,\n  \"mix\": true,\n  \"mixkey\": \"fc2d71d52cdd37cb49cca3f6a8e6877f40bc999ed67ab5808bb3b9f685cf0f94\",\n  \"nat\": \"extip:138.68.122.137\",\n  \"extMultiaddrs\": [\"/dns4/delivery-01.do-ams3.logos.dev.status.im/tcp/30303\"]\n}\n```", "execs": [{"kind": "file", "cmd": "write waku-config.json", "status": "pass", "note": "Wrote waku-config.json"}]}, {"md": "### 4.2 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-29 17:28:32.123] [warning] [logos] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-29 17:28:32.210] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: detected LogosProviderPlugin for \"capability_module\"\n[2026-06-29 17:28:32.210] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: registering LogosProviderObject <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
